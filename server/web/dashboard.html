<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="US-ASCII">
    <title>Dashboard IoT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7fafc;
            color: #102a43;
            margin: 0;
            padding: 32px;
        }
        .shell {
            margin: 0 auto;
            max-width: 900px;
        }
        .panel {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            margin-bottom: 18px;
            padding: 24px;
        }
        .metrics {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .metric {
            background: #eff6ff;
            border-radius: 10px;
            min-width: 180px;
            padding: 16px;
        }
        .label {
            color: #486581;
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .value {
            font-size: 28px;
            font-weight: bold;
        }
        button {
            background: #1f6feb;
            border: 0;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            padding: 10px 14px;
        }
        code {
            background: #f0f4f8;
            border-radius: 6px;
            padding: 2px 6px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel">
            <h1>Dashboard del Servidor</h1>
            <p>Vista web simple del estado actual del servidor central.</p>
            <button id="refresh" type="button">Actualizar Estado</button>
        </div>

        <div class="panel">
            <h2>Estado General</h2>
            <div class="metrics">
                <div class="metric">
                    <span class="label">Sensores Activos</span>
                    <span class="value" id="activeSensors">-</span>
                </div>
                <div class="metric">
                    <span class="label">Operadores Conectados</span>
                    <span class="value" id="activeOperators">-</span>
                </div>
                <div class="metric">
                    <span class="label">Uptime (s)</span>
                    <span class="value" id="uptimeSeconds">-</span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Endpoint HTTP</h2>
            <p>Los datos se cargan desde <code>/status</code>.</p>
            <pre id="rawPayload">Sin datos</pre>
        </div>
    </div>

    <script>
        async function refreshStatus() {
            try {
                const response = await fetch('/status', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const payload = await response.json();
                document.getElementById('activeSensors').textContent = payload.active_sensors;
                document.getElementById('activeOperators').textContent = payload.active_operators;
                document.getElementById('uptimeSeconds').textContent = payload.uptime_seconds;
                document.getElementById('rawPayload').textContent = JSON.stringify(payload, null, 2);
            } catch (error) {
                document.getElementById('rawPayload').textContent = 'No fue posible obtener /status: ' + error;
            }
        }

        document.getElementById('refresh').addEventListener('click', refreshStatus);
        refreshStatus();
    </script>
</body>
</html>
